  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --ink: #1A1714;
      --ink-2: #3D3730;
      --ink-3: #6B6259;
      --gold: #C4973A;
      --gold-2: #D4AA55;
      --cream: #FAF7F2;
      --cream-2: #F2EDE4;
      --cream-3: #E8E0D4;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
    }
    .verify-container {
      width: 100%;
      max-width: 450px;
      background: #24201C;
      border: 1px solid var(--ink-2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
      text-align: center;
    }
    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: brightness(0) invert(1) sepia(1) saturate(3.5) hue-rotate(10deg) brightness(1.05) drop-shadow(0 0 12px rgba(184, 146, 63, 0.45)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      margin-bottom: 0.5rem;
    }
    .form-title {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--cream);
      margin-bottom: 1.5rem;
      align-self: flex-start;
      border-left: 3px solid var(--gold);
      padding-left: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group {
      margin-bottom: 1.25rem;
      width: 100%;
    }
    .form-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--cream-3);
      margin-bottom: 0.4rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }
    .phone-prefix {
      width: 100px;
      padding: 0.85rem 0.5rem;
      background-color: var(--ink);
      border: 1px solid var(--ink-2);
      border-radius: 8px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='none' stroke='%23FAF7F2' stroke-width='2' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path stroke-linecap='round' stroke-linejoin='round' d='M19.5 8.25l-7.5 7.5-7.5-7.5'></path></svg>");
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 0.8rem;
      padding-right: 1.5rem;
    }
    .form-input {
      flex: 1;
      padding: 0.85rem 1rem;
      background-color: var(--ink);
      border: 1px solid var(--ink-2);
      border-radius: 8px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.25s ease;
    }
    .form-input:focus, .phone-prefix:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,151,58,0.2);
    }
    .btn-submit {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem;
      background-color: var(--gold);
      color: #ffffff;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.25s ease;
      margin-top: 0.5rem;
    }
    .btn-submit:hover {
      background-color: var(--gold-2);
      box-shadow: 0 5px 15px rgba(196,151,58,0.4);
      transform: translateY(-1px);
    }
    .btn-submit:disabled {
      background-color: var(--ink-2);
      color: var(--ink-3);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .info-text {
      font-size: 0.82rem;
      color: var(--cream-3);
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    .step-section {
      width: 100%;
    }
    .hidden {
      display: none;
    }
    .btn-back {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 9999;
      display: inline-block;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 8px 18px;
      transition: all 0.2s ease;
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.8s ease-in-out infinite;
      margin-right: 0.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .laser-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      perspective: 1px;
      transform-style: preserve-3d;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.35;
    }
    .laser-bar {
      height: 15%;
      width: 4%;
      float: left;
      border: 12px solid;
      animation: rotateLaser 2.5s infinite alternate;
    }
    @keyframes rotateLaser {
      0% {
        transform: translateZ(-3000px);
      }
      100% {
        transform: rotateY(-10deg);
      }
    }

  <a href="/registro/" class="btn-back">Regresar</a>

  <div class="verify-container">
    <div class="logo-area">
      <img src="{% static 'plataforma/img/logo.png' %}?v=2.0" alt="SoundWave Logo" class="logo-img">
    </div>

    <h2 class="form-title">Verificación de Teléfono</h2>

    <div id="step-1" class="step-section">
      <p class="info-text">Ingresa tu número de teléfono celular para recibir un código de confirmación por SMS.</p>
      
      <div class="form-group">
        <label for="phone">Número de Teléfono</label>
        <div class="input-row">
          <select id="country-code" class="phone-prefix">
            <option value="+593" selected>EC (+593)</option>
            <option value="+52">MX (+52)</option>
            <option value="+57">CO (+57)</option>
            <option value="+34">ES (+34)</option>
            <option value="+1">US (+1)</option>
          </select>
          <input type="tel" id="phone" class="form-input" placeholder="0999999999" required autocomplete="tel">
        </div>
      </div>

      <button type="button" id="btn-send-code" class="btn-submit">Enviar código de verificación</button>
    </div>

    <div id="step-2" class="step-section hidden">
      <p class="info-text">Se ha enviado un mensaje de texto con un código de verificación de 6 dígitos al número <strong id="display-number"></strong>.</p>
      
      <div class="form-group">
        <label for="verify-code">Código de Verificación</label>
        <input type="text" id="verify-code" class="form-input" placeholder="123456" maxlength="6" pattern="\d{6}" required autocomplete="one-time-code">
      </div>

      <button type="button" id="btn-verify" class="btn-submit">Verificar y continuar</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const step1 = document.getElementById('step-1');
      const step2 = document.getElementById('step-2');
      const phoneInput = document.getElementById('phone');
      const prefixSelect = document.getElementById('country-code');
      const btnSendCode = document.getElementById('btn-send-code');
      const btnVerify = document.getElementById('btn-verify');
      const displayNumber = document.getElementById('display-number');
      const verifyCodeInput = document.getElementById('verify-code');

      btnSendCode.addEventListener('click', function() {
        const phone = phoneInput.value.trim();
        if (!phone) {
          phoneInput.focus();
          return;
        }

        btnSendCode.disabled = true;
        btnSendCode.innerHTML = '<span class="spinner"></span>Enviando...';

        setTimeout(function() {
          const fullNumber = prefixSelect.value + ' ' + phone;
          displayNumber.textContent = fullNumber;
          step1.classList.add('hidden');
          step2.classList.remove('hidden');
        }, 1500);
      });

      btnVerify.addEventListener('click', function() {
        const code = verifyCodeInput.value.trim();
        if (code.length !== 6 || isNaN(code)) {
          verifyCodeInput.focus();
          return;
        }

        btnVerify.disabled = true;
        btnVerify.innerHTML = '<span class="spinner"></span>Validando...';

        setTimeout(function() {
          window.location.href = '/login/';
        }, 1000);
      });
    });
  </script>
</body>
</html>
