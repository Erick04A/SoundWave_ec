<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - SoundWave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1A1714;
      --ink-2: #3D3730;
      --ink-3: #6B6259;
      --gold: #C4973A;
      --gold-2: #D4AA55;
      --cream: #FAF7F2;
      --cream-2: #F2EDE4;
      --cream-3: #E8E0D4;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--cream);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .registro-page-wrapper {
      background-color: var(--ink);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 20px;
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .register-container {
      width: 100%;
      max-width: 500px;
      background: #24201C;
      border: 1px solid var(--ink-2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
      text-align: center;
    }
    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: brightness(0) invert(1) sepia(1) saturate(3.5) hue-rotate(10deg) brightness(1.05) drop-shadow(0 0 12px rgba(184, 146, 63, 0.45)) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      margin-bottom: 0.5rem;
      transition: filter 0.3s ease;
    }
    .logo-img:hover {
      filter: brightness(0) invert(1) sepia(1) saturate(3.5) hue-rotate(10deg) brightness(1.05) drop-shadow(0 0 18px rgba(184, 146, 63, 0.65)) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
    }
    .form-title {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--cream);
      margin-bottom: 1.5rem;
      align-self: flex-start;
      border-left: 3px solid var(--gold);
      padding-left: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
    }
    .form-group {
      margin-bottom: 1.25rem;
      width: 100%;
    }
    .form-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--cream-3);
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background-color: var(--ink);
      border: 1px solid var(--ink-2);
      border-radius: 8px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.25s ease;
    }
    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,151,58,0.2);
    }
    select.form-input {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='none' stroke='%23FAF7F2' stroke-width='2' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path stroke-linecap='round' stroke-linejoin='round' d='M19.5 8.25l-7.5 7.5-7.5-7.5'></path></svg>");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 0.9rem;
      padding-right: 2rem;
      cursor: pointer;
    }
    .btn-submit {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem;
      background-color: var(--gold);
      color: #ffffff;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.25s ease;
      margin-top: 0.5rem;
    }
    .btn-submit:hover {
      background-color: var(--gold-2);
      box-shadow: 0 5px 15px rgba(196,151,58,0.4);
      transform: translateY(-1px);
    }
    .separator {
      display: flex;
      align-items: center;
      text-align: center;
      width: 100%;
      margin: 1.5rem 0;
      color: var(--ink-3);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .separator::before,
    .separator::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--ink-2);
    }
    .separator:not(:empty)::before {
      margin-right: .75em;
    }
    .separator:not(:empty)::after {
      margin-left: .75em;
    }
    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0.8rem 1.1rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: var(--cream);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.25s ease;
      margin-bottom: 0.65rem;
    }
    .btn-social:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .btn-social svg {
      width: 18px;
      height: 18px;
      margin-right: 1rem;
      flex-shrink: 0;
    }
    .btn-social span {
      flex-grow: 1;
      text-align: center;
      margin-right: 18px;
    }
    .login-link-container {
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--cream-3);
      text-align: center;
    }
    .login-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .login-link:hover {
      color: var(--gold-2);
      text-decoration: underline;
    }
    .btn-back {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 9999;
      display: inline-block;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 8px 18px;
      transition: all 0.2s ease;
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .laser-background {
      position: absolute;
      inset: 0;
      z-index: 0;
      perspective: 1px;
      transform-style: preserve-3d;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.35;
    }
    .laser-bar {
      height: 15%;
      width: 4%;
      float: left;
      border: 12px solid;
      animation: rotateLaser 2.5s infinite alternate;
    }

    <a href="/" class="btn-back">Regresar</a>

    <div class="register-container">
      <div class="logo-area">
        <img src="{% static 'plataforma/img/logo.png' %}?v=2.0" alt="SoundWave Logo" class="logo-img">
      </div>

      <h2 class="form-title">Crear Cuenta</h2>

      <form method="POST" action="">
        {% csrf_token %}
        <div class="form-row">
          <div class="form-group">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" name="nombres" class="form-input" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" name="apellidos" class="form-input" required autocomplete="family-name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" class="form-input" required autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="pais">País</label>
            <select id="pais" name="pais" class="form-input" required>
              <option value="EC" selected>Ecuador</option>
              <option value="AR">Argentina</option>
              <option value="BO">Bolivia</option>
              <option value="CL">Chile</option>
              <option value="CO">Colombia</option>
              <option value="CR">Costa Rica</option>
              <option value="ES">España</option>
              <option value="MX">México</option>
              <option value="PE">Perú</option>
              <option value="UY">Uruguay</option>
              <option value="VE">Venezuela</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" class="form-input" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmar_contrasena">Confirmar contraseña</label>
          <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" class="form-input" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-submit">Crear cuenta en SoundWave</button>
      </form>

      <div class="separator">o continúa con</div>

      <a href="/accounts/google/login/" class="btn-social">
