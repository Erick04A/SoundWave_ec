{% extends 'plataforma/base.html' %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto; border-color: var(--cream-3); background: #ffffff; padding: 2rem;">
  <div class="card-header-premium" style="margin-bottom: 2rem;">
    <h2 class="card-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--ink);" data-i18n="ajustes_title">Ajustes de Perfil</h2>
    <span class="card-action-btn" data-i18n="ajustes_subtitle">Mi Cuenta</span>
  </div>

  {% if error %}
    <div style="background-color: #fce4e4; border-left: 4px solid var(--crimson, #BE185D); padding: 1rem; border-radius: 8px; color: var(--crimson-dark, #881337); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
      {{ error }}
    </div>
  {% endif %}

  {% if success %}
    <div style="background-color: #eafaf1; border-left: 4px solid #2ecc71; padding: 1rem; border-radius: 8px; color: #27ae60; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
      {{ success }}
    </div>
  {% endif %}

  <form method="post" action="/ajustes/">
    {% csrf_token %}
    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
      <div class="form-group">
        <label style="display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-3); margin-bottom: 0.5rem;" data-i18n="ajustes_label_name">Nombre de Usuario</label>
        <input type="text" name="nombre" value="{{ user_data.nombre }}" class="filter-input" style="background-color: var(--cream-2); border-color: var(--cream-3);" required>
      </div>

      <div class="form-group">
        <label style="display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-3); margin-bottom: 0.5rem;" data-i18n="ajustes_label_email">Correo Electrónico</label>
        <input type="email" name="email" value="{{ user_data.email }}" class="filter-input" style="background-color: var(--cream-2); border-color: var(--cream-3);" required>
      </div>

      <div class="form-group">
        <label style="display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-3); margin-bottom: 0.5rem;" data-i18n="ajustes_label_pass">Contraseña</label>
        <input type="text" name="contrasena" value="{{ user_data.contrasena }}" class="filter-input" style="background-color: var(--cream-2); border-color: var(--cream-3);" required>
      </div>

      <div style="margin-top: 1rem; display: flex; justify-content: flex-end;">
        <button type="submit" class="btn btn-gold" style="padding: 0.75rem 2rem;" data-i18n="ajustes_btn_save">Guardar Cambios</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
