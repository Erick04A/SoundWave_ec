{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="max-age=300, must-revalidate">
  <title>SoundWave</title>
  
  <link rel="prefetch" href="/">
  <link rel="prefetch" href="/catalogo/">
  <link rel="prefetch" href="/historial/">
  <link rel="prefetch" href="/suscripcion/">
  
  <!-- Precarga de fuentes asíncrona no bloqueante -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"></noscript>
  
  <!-- Precarga de estilos -->
  <link rel="preload" href="{% static 'plataforma/css/estilos_globales.css' %}?v=1.2" as="style">
  <link rel="stylesheet" href="{% static 'plataforma/css/estilos_globales.css' %}?v=1.2">
  
  <style>
    body {
        opacity: 0;
        animation: fadeIn 0.15s ease forwards;
    }
    @keyframes fadeIn {
        to { opacity: 1; }
    }
    @keyframes progress-dummy {
        0% { width: 10%; }
        50% { width: 85%; }
        100% { width: 10%; }
    }
    .player-progress-active {
        width: 15%;
        height: 100%;
        background-color: var(--gold, #c9a84c);
        border-radius: 2px;
        animation: progress-dummy 25s linear infinite;
    }
  </style>
</head>
<body>
<div id="progress-bar" style="position:fixed;top:0;left:0;height:3px;width:0%;background:#c9a84c;z-index:9999;transition:width 0.3s ease;"></div>

<script>
(function() {
    // Fade out al navegar
    document.querySelectorAll('nav a').forEach(function(link) {
        link.addEventListener('click', function(e) {
            var href = this.getAttribute('href');
            if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
                e.preventDefault();
                document.body.style.transition = 'opacity 0.12s ease';
                document.body.style.opacity = '0';
                setTimeout(function() {
                    window.location.href = href;
                }, 120);
            }
        });
    });
    // Fade in al cargar
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.15s ease';
    window.addEventListener('load', function() {
        document.body.style.opacity = '1';
    });
})();
</script>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="{% static 'plataforma/img/logo.png' %}?v=2.0" alt="SoundWave" class="sidebar-logo-img" loading="eager">
    <span>Plataforma Musical</span>
  </div>
  <nav class="sidebar-nav">
    <a href="{% url 'dashboard' %}?id_usuario={{ id_usuario }}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Inicio</a>
    <a href="{% url 'catalogo' %}?id_usuario={{ id_usuario }}" class="nav-item {% if request.resolver_match.url_name == 'catalogo' %}active{% endif %}">Catálogo</a>
    <a href="{% url 'historial' %}?id_usuario={{ id_usuario }}" class="nav-item {% if request.resolver_match.url_name == 'historial' %}active{% endif %}">Historial</a>
    <a href="{% url 'suscripcion' %}?id_usuario={{ id_usuario }}" class="nav-item {% if request.resolver_match.url_name == 'suscripcion' %}active{% endif %}">Suscripción</a>
    
    <div class="nav-divider" style="border-top: 1px solid rgba(255,255,255,0.1); margin: 1rem 0 0.5rem 0;"></div>
    <p class="nav-section-label" style="font-size: 0.7rem; color: var(--ink-3, #6B6259); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.2rem;">ADMINISTRACIÓN</p>
    <a href="{% url 'administracion' %}?id_usuario={{ id_usuario }}" class="nav-item nav-admin {% if request.resolver_match.url_name == 'administracion' %}active{% endif %}" style="color: #e74c3c !important; font-weight: 600; {% if request.resolver_match.url_name == 'administracion' %}background-color: rgba(231,76,60,0.08); border-radius: 8px; padding-left: 8px;{% endif %}">
        Panel Admin
    </a>
  </nav>
  <div class="sidebar-player">
    <div class="player-track">{{ cancion_actual|default:"Shape of You" }}</div>
    <div class="player-artist">{{ artista_actual|default:"Ed Sheeran" }}</div>
    <div class="player-bar"><div class="player-progress-active"></div></div>
  </div>
</aside>
<main class="main">
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>
</main>
{% block extra_js %}{% endblock %}
</body>
</html>
